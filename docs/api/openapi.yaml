openapi: 3.0.3
info:
  title: AutoHub API (sketch)
  description: |
    Sketch of the REST contract that HTTP adapters under
    `lib/features/*/adapters/outbound/http_*.dart` implement.
    Run a local mock server: `dart run tool/mock_server.dart`.
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local mock server
  - url: https://api.example.com
    description: Production (TBD)

paths:
  /auth/otp/request:
    post:
      summary: Request an OTP for a phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string, example: "+380671234567" }
      responses:
        '200':
          description: Challenge issued.
          content:
            application/json:
              schema:
                type: object
                required: [challengeId, phone]
                properties:
                  challengeId: { type: string }
                  phone: { type: string }

  /auth/otp/verify:
    post:
      summary: Exchange an OTP code for a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeId, code]
              properties:
                challengeId: { type: string }
                code: { type: string, example: "0000" }
      responses:
        '200':
          description: Session granted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: Invalid code.

  /vehicles:
    get:
      summary: List the signed-in user's vehicles.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of vehicles.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Vehicle' }
    post:
      summary: Add a vehicle.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Vehicle' }
      responses:
        '201':
          description: Vehicle created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Vehicle' }

  /orders:
    get:
      summary: List active orders for the signed-in user.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of orders.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ActiveOrder' }
    post:
      summary: Create an order.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActiveOrder' }
      responses:
        '201':
          description: Order created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActiveOrder' }

  /orders/{id}:
    get:
      summary: Get one order.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: Order.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActiveOrder' }
        '404':
          description: Not found.

  /history/{vehicleId}:
    get:
      summary: Service history for a vehicle.
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: vehicleId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Records.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ServiceRecord' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Session:
      type: object
      required: [phone, createdAt]
      properties:
        phone: { type: string }
        createdAt: { type: string, format: date-time }
    Vehicle:
      type: object
      required: [id, make, model, year, plate, mileageKm]
      properties:
        id: { type: string }
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        plate: { type: string }
        vin: { type: string, nullable: true }
        mileageKm: { type: integer }
        nextServiceMileageKm: { type: integer, nullable: true }
    ServiceRecord:
      type: object
      required: [id, title, completed_at, price_uah, vehicle_id]
      properties:
        id: { type: string }
        title: { type: string }
        completed_at: { type: string, format: date-time }
        price_uah: { type: integer }
        vehicle_id: { type: string }
    ActiveOrder:
      type: object
      required: [id, title, status, status_label, vehicle]
      properties:
        id: { type: string }
        title: { type: string }
        status: { type: string, enum: [in_progress, pending_confirmation, canceled] }
        status_label: { type: string }
        vehicle:
          type: object
          required: [make, model, plate]
          properties:
            make: { type: string }
            model: { type: string }
            plate: { type: string }
        progress: { type: number, nullable: true }
        eta: { type: string, format: date-time, nullable: true }
        scheduled_for: { type: string, format: date-time, nullable: true }
        total_uah: { type: integer, nullable: true }
        timeline:
          type: array
          items:
            type: object
            required: [stage, label, at]
            properties:
              stage: { type: string, enum: [pending_confirmation, accepted, diagnostics, in_progress, done, canceled] }
              label: { type: string }
              at: { type: string, format: date-time }
        photos:
          type: array
          items:
            type: object
            required: [local_path, taken_at]
            properties:
              local_path: { type: string }
              taken_at: { type: string, format: date-time }
